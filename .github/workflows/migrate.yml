name: Migrate database

# Applies the committed migration history (prisma/migrations/) to the Neon
# branch that matches the git branch:
#
#   git dev     → GitHub environment "dev"        → Neon branch dev
#   git staging → GitHub environment "staging"    → Neon branch staging
#   git main    → GitHub environment "production" → Neon branch production
#
# Each GitHub environment (repo → Settings → Environments) holds ONE secret:
#   DATABASE_URL — that Neon branch's DIRECT (non "-pooler") connection
#   string. Migrations must not run through the connection pooler.
#
# `prisma migrate deploy` is idempotent: it checks the _prisma_migrations
# table and only runs files that haven't been applied yet, in order. Safe to
# re-run any time (workflow_dispatch runs it for whichever branch you pick).
on:
  push:
    branches: [dev, staging, main]
    # Only fire when the migration history actually changes…
    paths:
      - "prisma/migrations/**"
  # …but keep a manual trigger for first-time setup / re-runs.
  workflow_dispatch:

concurrency:
  # One migration at a time per git branch; never abort a half-applied run.
  group: migrate-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # main deploys to the "production" environment; dev/staging match by name.
    environment: ${{ github.ref_name == 'main' && 'production' || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Apply committed migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run db:migrate:deploy:prod
