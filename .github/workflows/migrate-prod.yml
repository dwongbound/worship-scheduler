name: Migrate production database

# Applies the committed migration history (prisma/migrations/) to the prod
# Neon database — the automated version of the manual
# `DATABASE_URL=... npm run db:migrate:deploy:prod`.
#
# `prisma migrate deploy` is idempotent: it checks the _prisma_migrations
# table and only runs files that haven't been applied yet, in order. Safe to
# re-run any time.
#
# Requires ONE repo secret (Settings → Secrets and variables → Actions):
#   PROD_DATABASE_URL — the DIRECT (non "-pooler") Neon connection string.
#   Migrations must not run through the connection pooler.
on:
  push:
    branches: [main]
    # Only fire when the migration history actually changes…
    paths:
      - "prisma/migrations/**"
  # …but keep a manual trigger for first-time setup / re-runs.
  workflow_dispatch:

concurrency:
  group: migrate-prod
  cancel-in-progress: false # never abort a half-applied migration run

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Apply committed migrations
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: npm run db:migrate:deploy:prod
