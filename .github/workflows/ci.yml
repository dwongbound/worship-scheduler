name: CI

# Runs the full test suite (typecheck happens implicitly via next/vitest
# transforms; unit + e2e run for real) on every PR and every push to the
# dev → staging → main promotion branches, using the same docker compose
# test profile you run locally.
on:
  pull_request:
  push:
    branches: [dev, staging, main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # env/ is gitignored (real secrets live there locally), so CI writes the
      # throwaway TEST values itself. Nothing here is secret: the db only
      # exists inside the compose network for the duration of the job.
      - name: Create env/test.env
        run: |
          mkdir -p env
          cat > env/test.env <<'EOF'
          POSTGRES_USER=worship
          POSTGRES_PASSWORD=worship
          POSTGRES_DB=worship_test
          DATABASE_URL=postgresql://worship:worship@localhost:5433/worship_test
          NEXTAUTH_URL=http://localhost:3100
          NEXTAUTH_SECRET=test-only-secret
          SEED_ADMIN_USERNAME=admin
          SEED_ADMIN_PASSWORD=password123
          ORG_KEYS=Sunday Church:test-sunday-key,Youth Ministry:test-youth-key
          APP_TZ=America/Los_Angeles
          EOF

      # Same command as local: boots a throwaway postgres, installs deps,
      # pushes the schema, runs vitest then playwright, exits with the result.
      - name: Unit + e2e tests
        run: >
          docker compose --profile test up
          --abort-on-container-exit
          --exit-code-from worship-scheduler-test

      # Playwright traces/screenshots for debugging a red run.
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore
